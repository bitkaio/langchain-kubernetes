# ---------------------------------------------------------------------------
# langchain-kubernetes — GitLab CI/CD
#
# Tag convention:
#   py-X.Y.Z   → build & release the Python package (langchain-kubernetes X.Y.Z)
#   ts-X.Y.Z   → build & release the TypeScript package (@bitkaio/langchain-kubernetes X.Y.Z)
#
# On the main branch: tests only (no publish).
# On a matching tag:  test → build → publish to GitLab registry + public registry.
# ---------------------------------------------------------------------------

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^(py|ts)-\d+\.\d+\.\d+/
    # Allow a pipeline to be created on any branch so that the manual
    # dev-publish jobs below are accessible from the GitLab UI / API.
    # Automatic jobs on non-main branches have their own guards and will
    # not run — only the manual jobs are visible.
    - if: $CI_COMMIT_BRANCH

stages:
  - test
  - build
  - publish-gitlab
  - publish-public
  - dev-publish

# ---------------------------------------------------------------------------
# Reusable rule anchors
# ---------------------------------------------------------------------------

.rules-python: &rules-python
  rules:
    - if: $CI_COMMIT_TAG =~ /^py-\d+\.\d+\.\d+/
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

.rules-python-tag-only: &rules-python-tag-only
  rules:
    - if: $CI_COMMIT_TAG =~ /^py-\d+\.\d+\.\d+/

.rules-typescript: &rules-typescript
  rules:
    - if: $CI_COMMIT_TAG =~ /^ts-\d+\.\d+\.\d+/
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

.rules-typescript-tag-only: &rules-typescript-tag-only
  rules:
    - if: $CI_COMMIT_TAG =~ /^ts-\d+\.\d+\.\d+/

# ---------------------------------------------------------------------------
# Stage: test
# ---------------------------------------------------------------------------

python:test:
  stage: test
  image: python:3.11-slim
  <<: *rules-python
  before_script:
    - pip install poetry
    - cd python && poetry install --with dev
  script:
    - poetry run pytest tests/unit/ -v
  cache:
    key: python-$CI_COMMIT_REF_SLUG
    paths:
      - python/.venv/

typescript:test:
  stage: test
  image: node:22-slim
  <<: *rules-typescript
  before_script:
    - npm install -g pnpm
    - cd typescript && pnpm install --frozen-lockfile
  script:
    - pnpm test
  cache:
    key: typescript-$CI_COMMIT_REF_SLUG
    paths:
      - typescript/node_modules/

# ---------------------------------------------------------------------------
# Stage: build
# ---------------------------------------------------------------------------

python:build:
  stage: build
  image: python:3.11-slim
  <<: *rules-python-tag-only
  needs:
    - python:test
  before_script:
    - pip install poetry
  script:
    # Extract version from tag (py-1.2.3 → 1.2.3)
    - export PACKAGE_VERSION="${CI_COMMIT_TAG#py-}"
    - echo "Building Python package version $PACKAGE_VERSION"
    - cd python
    - poetry version "$PACKAGE_VERSION"
    - poetry build
  artifacts:
    paths:
      - python/dist/
    expire_in: 1 hour

typescript:build:
  stage: build
  image: node:22-slim
  <<: *rules-typescript-tag-only
  needs:
    - typescript:test
  before_script:
    - npm install -g pnpm
    - cd typescript && pnpm install --frozen-lockfile
  script:
    # Extract version from tag (ts-1.2.3 → 1.2.3)
    - export PACKAGE_VERSION="${CI_COMMIT_TAG#ts-}"
    - echo "Building TypeScript package version $PACKAGE_VERSION"
    - npm version "$PACKAGE_VERSION" --no-git-tag-version --allow-same-version
    - pnpm build
  artifacts:
    paths:
      - typescript/dist/
      - typescript/package.json
    expire_in: 1 hour

# ---------------------------------------------------------------------------
# Stage: publish-gitlab
# Publish to the GitLab package registry (PyPI + npm).
# Uses CI_JOB_TOKEN — no external secrets required.
# ---------------------------------------------------------------------------

python:publish-gitlab:
  stage: publish-gitlab
  image: python:3.11-slim
  <<: *rules-python-tag-only
  needs:
    - python:build
  before_script:
    - pip install twine
  script:
    - echo "Publishing Python package to GitLab registry"
    - cd python
    - TWINE_PASSWORD="${CI_JOB_TOKEN}"
      TWINE_USERNAME="gitlab-ci-token"
      python -m twine upload
        --repository-url "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi"
        dist/*
  environment:
    name: gitlab-registry/python

typescript:publish-gitlab:
  stage: publish-gitlab
  image: node:22-slim
  <<: *rules-typescript-tag-only
  needs:
    - typescript:build
  before_script:
    - npm install -g pnpm
  script:
    - echo "Publishing TypeScript package to GitLab npm registry"
    - cd typescript
    - pnpm install --frozen-lockfile
    # Configure GitLab npm registry for the @bitkaio scope
    - |
      cat >> .npmrc <<EOF
      @bitkaio:registry=https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/
      //${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}
      EOF
    - pnpm publish --no-git-checks --access public
  environment:
    name: gitlab-registry/typescript

# ---------------------------------------------------------------------------
# Stage: publish-public
# Publish to PyPI and npmjs using trusted publisher (OIDC) — no long-lived
# secrets required. Configure a trusted publisher in each registry's dashboard
# pointing at this GitLab project/environment before the first release.
# ---------------------------------------------------------------------------

python:publish-pypi:
  stage: publish-public
  image: python:3.11-slim
  <<: *rules-python-tag-only
  id_tokens:
    PYPI_ID_TOKEN:
      aud: pypi
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  needs:
    - python:publish-gitlab
    - python:build
  before_script:
    - pip install twine
    - apt-get update -qq && apt-get install -qq -y curl
  script:
    - echo "Publishing Python package to PyPI"
    - |
      # Exchange the GitLab OIDC token for a short-lived PyPI mint token.
      # Capture the full response first so the error body is visible on failure.
      MINT_RESPONSE=$(curl -sSL \
        -H "Content-Type: application/json" \
        -d "{\"token\": \"${PYPI_ID_TOKEN}\"}" \
        "https://pypi.org/_/oidc/mint-token")
      echo "Mint-token response: ${MINT_RESPONSE}"
      PYPI_MINT_TOKEN=$(echo "${MINT_RESPONSE}" \
        | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
      cd python
      TWINE_USERNAME="__token__" TWINE_PASSWORD="${PYPI_MINT_TOKEN}" \
        python -m twine upload dist/*
  environment:
    name: pypi

# ---------------------------------------------------------------------------
# Stage: dev-publish
#
# Manual jobs — trigger from any branch via the GitLab UI ("Run pipeline" or
# the play button next to the job) or via the API.
#
# Version scheme (GitLab Package Registry only — never touches public registries):
#   Python:     {base_version}.dev{CI_PIPELINE_IID}
#               e.g. 0.1.0.dev42   — valid PEP 440, sorts below 0.1.0
#   TypeScript: {base_version}-dev.{CI_PIPELINE_IID}
#               e.g. 0.0.1-dev.42  — valid semver pre-release
#               published with --tag dev (never affects the npm `latest` tag)
#
# CI_PIPELINE_IID is a project-scoped sequential integer that increases with
# every pipeline, giving a unique, comparable version for every manual build.
# ---------------------------------------------------------------------------

.dev-publish-base:
  stage: dev-publish
  when: manual
  allow_failure: false
  # Available on every branch; the `when: manual` guard means it never runs
  # automatically.
  rules:
    - if: $CI_COMMIT_BRANCH
      when: manual

python:dev-publish:
  extends: .dev-publish-base
  image: python:3.11-slim
  variables:
    # The base version is read from pyproject.toml at runtime so this file
    # never needs to be edited for dev builds.
    DEV_VERSION_SUFFIX: ".dev${CI_PIPELINE_IID}"
  before_script:
    - pip install poetry twine
    - cd python && poetry install --with dev
  script:
    # ── 1. Run unit tests ────────────────────────────────────────────────────
    - poetry run pytest tests/unit/ -q
    # ── 2. Compute dev version ───────────────────────────────────────────────
    - BASE_VERSION=$(poetry version --short)
    - DEV_VERSION="${BASE_VERSION}.dev${CI_PIPELINE_IID}"
    - echo "Dev version → ${DEV_VERSION}  (branch=${CI_COMMIT_REF_NAME}, pipeline=${CI_PIPELINE_IID})"
    # ── 3. Stamp version and build wheel + sdist ─────────────────────────────
    - poetry version "${DEV_VERSION}"
    - poetry build
    # ── 4. Publish to GitLab PyPI registry ──────────────────────────────────
    - |
      TWINE_USERNAME="gitlab-ci-token" \
      TWINE_PASSWORD="${CI_JOB_TOKEN}" \
      python -m twine upload \
        --repository-url "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi" \
        dist/*
    - echo "Published ${DEV_VERSION} to GitLab PyPI registry"
  environment:
    name: gitlab-registry/python-dev
  artifacts:
    name: "python-dev-${CI_PIPELINE_IID}"
    paths:
      - python/dist/
    expire_in: 7 days

typescript:dev-publish:
  extends: .dev-publish-base
  image: node:22-slim
  before_script:
    - npm install -g pnpm
    - cd typescript && pnpm install --frozen-lockfile
  script:
    # ── 1. Run unit tests ────────────────────────────────────────────────────
    - pnpm test
    # ── 2. Compute dev version ───────────────────────────────────────────────
    - BASE_VERSION=$(node -p "require('./package.json').version")
    - DEV_VERSION="${BASE_VERSION}-dev.${CI_PIPELINE_IID}"
    - echo "Dev version → ${DEV_VERSION}  (branch=${CI_COMMIT_REF_NAME}, pipeline=${CI_PIPELINE_IID})"
    # ── 3. Stamp version and build ───────────────────────────────────────────
    - npm version "${DEV_VERSION}" --no-git-tag-version --allow-same-version
    - pnpm build
    # ── 4. Configure GitLab npm registry for the @bitkaio scope ─────────────
    - |
      cat >> .npmrc <<EOF
      @bitkaio:registry=https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/
      //${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}
      EOF
    # ── 5. Publish with dist-tag "dev" (never overwrites "latest") ───────────
    - pnpm publish --no-git-checks --tag dev
    - echo "Published ${DEV_VERSION} to GitLab npm registry (tag=dev)"
  environment:
    name: gitlab-registry/typescript-dev
  artifacts:
    name: "typescript-dev-${CI_PIPELINE_IID}"
    paths:
      - typescript/dist/
    expire_in: 7 days

typescript:publish-npmjs:
  stage: publish-public
  image: node:22-slim
  <<: *rules-typescript-tag-only
  id_tokens:
    NPM_ID_TOKEN:
      aud: "npm:registry.npmjs.org"
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  needs:
    - typescript:publish-gitlab
    - typescript:build
  before_script:
    - npm install -g pnpm npm@latest
  script:
    - echo "Publishing TypeScript package to npmjs"
    - cd typescript
    - pnpm install --frozen-lockfile
    - npm publish --access public --provenance --registry=https://registry.npmjs.org/
  environment:
    name: npmjs
