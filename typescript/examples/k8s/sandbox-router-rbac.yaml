# RBAC for the langchain-kubernetes agent-sandbox client.
# Grants the service account permission to manage SandboxClaims.
#
# Apply with: kubectl apply -f sandbox-router-rbac.yaml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: langchain-kubernetes-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: langchain-kubernetes-role
  namespace: default
rules:
- apiGroups: ["extensions.agents.x-k8s.io"]
  resources: ["sandboxclaims"]
  verbs: ["create", "delete", "get", "list", "watch"]
- apiGroups: ["agents.x-k8s.io"]
  resources: ["sandboxes"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: langchain-kubernetes-rolebinding
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: langchain-kubernetes-role
subjects:
- kind: ServiceAccount
  name: langchain-kubernetes-sa
  namespace: default
